name: release

# Third-party actions are pinned to immutable commit SHAs. Update the SHA and
# version comment together; never rely on a mutable tag.

# A release tags images that were already built on main, identified by
# their build inputs rather than by a commit or a previous release. Any
# image whose content tag is missing — a tag on a commit main never
# built, say — is built here instead, so a release never depends on an
# earlier one having completed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: >-
          Rebuild every image instead of reusing content tags. Only needed
          when a build input outside the repository changed.
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check the tag is SemVer
        id: version
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be SemVer with a v prefix (for example v0.1.0)." >&2
            exit 1
          fi

          printf 'version=%s\n' "${GITHUB_REF_NAME#v}" >>"${GITHUB_OUTPUT}"

  images:
    name: Images
    needs: validate
    uses: ./.github/workflows/images.yml
    permissions:
      contents: read
      packages: write
    with:
      release_version: ${{ needs.validate.outputs.version }}
      force_rebuild: ${{ inputs.force_rebuild || false }}

  chart:
    name: Helm chart
    needs:
      - validate
      - images
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.17.3

      - name: Log in to GHCR
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "${GHCR_TOKEN}" | \
            helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Package and push chart
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          helm dependency build deploy/helm/gbo-app
          helm package deploy/helm/gbo-app \
            --version "${VERSION}" \
            --app-version "${VERSION}"
          helm push "gbo-app-${VERSION}.tgz" \
            oci://ghcr.io/ictu/gbo-demo-charts
