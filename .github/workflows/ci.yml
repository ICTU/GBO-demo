name: ci

# Third-party actions and container images are pinned to immutable
# commit SHAs / digests. Update the SHA + the version comment together
# when bumping; never rely on a mutable tag.

on:
  pull_request:
  push:
    branches: [main]

env:
  # openpolicyagent/opa:1.9.0-static
  OPA_IMAGE: openpolicyagent/opa:1.9.0-static@sha256:60b6af32b58377718546ac7d4634eecbfe50ec36f7d3ca3f8ebf515f9826c2ac

jobs:
  go:
    name: Go — lint + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - bron-sidecar
          - bsnk-mock
          - consent-portal-backend
          - consent-register
          - dev-portal-backend
          - dienstverlener-backend
          - eudi-adapter
          - graphql-server
          - pdp-service
          - sector-pip
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version: '1.25'
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: --config ../../.golangci.yml --timeout 3m
          working-directory: services/${{ matrix.service }}
      - name: go test
        working-directory: services/${{ matrix.service }}
        run: go test -timeout 60s ./...

  rego:
    name: Rego — fmt + check + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: opa fmt --diff
        run: |
          docker run --rm -v $(pwd)/policies:/w -w /w \
            $OPA_IMAGE fmt --diff /w
      - name: opa check
        run: |
          docker run --rm -v $(pwd)/policies:/w -w /w \
            $OPA_IMAGE check /w
      - name: opa test
        run: |
          docker run --rm -v $(pwd)/policies:/w -w /w \
            $OPA_IMAGE test /w -v

  frontend:
    name: Frontend — tsc --strict
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - developer-portal
          - dienstverlener-mock
          - toestemmingsportaal-frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: npm ci
        working-directory: ${{ matrix.app }}
        run: npm ci
      - name: tsc --noEmit
        working-directory: ${{ matrix.app }}
        run: npx tsc --noEmit

  docker:
    name: Docker — build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eudi-adapter
          - graphql-server
          - pdp-service
          - sector-pip
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build image
        run: |
          docker build \
            --file "services/${{ matrix.service }}/Dockerfile" \
            --tag "gbo-demo/${{ matrix.service }}:ci" \
            "services/${{ matrix.service }}"
