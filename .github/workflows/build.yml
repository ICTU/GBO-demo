name: build

# Publishes a content-tagged image for anything on main whose build
# inputs changed, so that releasing is a retag rather than a rebuild.
# Images whose inputs are unchanged are already in the registry and are
# skipped, which is why this can run on every push without rebuilding
# fourteen images each time.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: >-
          Rebuild every image even if its content tag exists. Use to
          refresh images after a build input outside the repository
          changed, without cutting a release.
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images
  cancel-in-progress: false

jobs:
  images:
    name: Images
    uses: ./.github/workflows/images.yml
    permissions:
      contents: read
      packages: write
    with:
      force_rebuild: ${{ inputs.force_rebuild || false }}
