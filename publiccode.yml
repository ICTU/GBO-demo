description:
  en:
    localisedName: GBO — Gemeenschappelijke Bronontsluiting
    shortDescription: >
      Reference-architecture demo for GBO (Gemeenschappelijke
      Bronontsluiting) with fine-grained authorization (consent + wallet
      flows over OpenFSC).
    longDescription: >
      A live, runnable reference architecture that shows how a consumer
      can obtain data from a source-holder over a trusted transport
      channel, where every request is authorized against machine-readable
      policy (Rego/OPA) and where the source retains control over
      identifier resolution. Two access flows run side-by-side on the
      same authorization pipeline: a citizen-consent flow (DvTP) and an
      EUDI-wallet flow, both routed through real OpenFSC v2.4.0
      transport.
    features:
      - Consent-based data access (DvTP)
      - EUDI-wallet-based data access
      - OpenFSC v2.4.0 transport
      - OPA policy evaluation
      - Distributed tracing (OpenTelemetry / Jaeger)

