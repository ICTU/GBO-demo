replicaCount: 1

image:
  # Example: ghcr.io/ictu/gbo-demo/bsnk-mock
  repository: ghcr.io/ictu/gbo-demo/bsnk-mock
  # Defaults to Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

containerPort: 8080

# Override the image entrypoint and arguments when needed.
command: []
args: []

# Example:
# env:
#   - name: FOO
#     value: bar
env: []

# Example:
# envFrom:
#   - secretRef:
#       name: eudi-secrets
envFrom: []

# Native Kubernetes volume mounts and pod volumes.
volumeMounts: []
volumes: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 50m
    memory: 64Mi

health:
  enabled: true
  scheme: HTTP
  # Optional numeric container port for the probes when the app serves
  # health on a different port than containerPort (e.g. OpenFTV PDP:
  # svc on 8443, health on 8080). Empty = the named http port.
  port: null
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
healthPath: /healthz

route:
  enabled: false
  hostname: ""
  parentRefs:
    - name: default-gateway
      namespace: fds-public
      sectionName: https

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
