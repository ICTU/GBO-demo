image:
  repository: ghcr.io/ictu/gbo-demo/opa
  tag: 0.3.0

containerPort: 8181
command:
  - /opa
args:
  - run
  - --server
  - --addr=0.0.0.0:8181
  # Demo policies are baked into the image at /policies — no ConfigMap
  # mount needed. Keep --watch so a future mount/CSI update would still
  # live-reload; it is a no-op on the baked-in directory.
  - --watch
  - --log-level=info
  - --set=decision_logs.console=true
  - /policies

healthPath: /health
