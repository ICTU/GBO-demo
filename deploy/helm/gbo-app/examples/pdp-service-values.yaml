image:
  repository: ghcr.io/ictu/gbo-demo/pdp-service
  tag: 0.3.0

containerPort: 4008
env:
  - name: TLS_CERT_PATH
    value: /certs/tls.crt
  - name: TLS_KEY_PATH
    value: /certs/tls.key

health:
  scheme: HTTPS
healthPath: /health

# GraphQL mirror-schemas are baked into the image at /schemas — no
# ConfigMap mount needed (a mount would shadow the baked-in files).
volumeMounts:
  - name: tls
    mountPath: /certs
    readOnly: true
volumes:
  - name: tls
    secret:
      secretName: pdp-service-tls
