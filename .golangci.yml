# golangci-lint v2 config for the demo Go services.
#
# Each service under services/ is its own Go module, so lint runs are
# scoped per service (see .github/workflows/ci.yml).

version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocyclo
  settings:
    gocyclo:
      # main() often wires up many routes/handlers; 30 is a pragmatic ceiling.
      min-complexity: 30
    errcheck:
      exclude-functions:
        # These stdlib helpers rarely fail in the ways that matter for a
        # demo and checking every return would clutter the code.
        - (io.Closer).Close
        - (*os.File).Close
        - (*compress/gzip.Writer).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
  exclusions:
    # v1's issues.exclude-use-default: false — do not apply the default
    # exclude-rules (we want every finding, no built-in silencing).
    presets: []

formatters:
  enable:
    - gofmt
