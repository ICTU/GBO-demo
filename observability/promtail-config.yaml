server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discover containers from the compose project and ship their stdout to Loki.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=${COMPOSE_PROJECT_NAME}"]

    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'

    # Pipeline: parse slog JSON, lift level + service to labels. trace_id stays
    # in the line body — keeping high-cardinality fields out of labels
    # preserves Loki stream-count bounds; Grafana derived-fields will extract
    # trace_id at query time for the Jaeger cross-link.
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            ts: time
      - labels:
          level:
          service:
      - timestamp:
          source: ts
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
