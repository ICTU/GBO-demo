apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      # Extract trace_id from slog JSON log lines and turn it into a clickable
      # link to the Jaeger trace. The regex captures the hex-string after the
      # "trace_id":"..." field that loggerFromCtx writes.
      derivedFields:
        - name: trace_id
          matcherType: regex
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          datasourceUid: jaeger
          url: '$${__value.raw}'
          urlDisplayLabel: 'View trace in Jaeger'

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    isDefault: false
    editable: false
    jsonData:
      # Click "Logs for this span" in Jaeger to jump to the matching Loki logs.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: true
        customQuery: true
        query: '{service=~".+"} |= "$${__trace.traceId}"'
