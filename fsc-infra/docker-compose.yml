      TLS_GROUP_TOKEN_CERT: /certs/org/edi-issuer.pem
      TLS_GROUP_TOKEN_KEY: /certs/org/edi-issuer-key.pem
      TLS_GROUP_CONTRACT_CERT: /certs/org/edi-issuer.pem
