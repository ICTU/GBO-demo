      LISTEN_ADDRESS: 0.0.0.0:8080
      NAME: HvOutway-01
      CONTROLLER_REGISTRATION_API_ADDRESS: https://hv-controller:9443
      TX_LOG_API_ADDRESS: https://hv-txlog-api:9443
      MANAGER_INTERNAL_ADDRESS: https://hv-manager:9443
      ENABLE_GRANT_HASH_SUGGESTION: "true"
    depends_on:
      - hv-controller
      - hv-manager
      - hv-txlog-api

  hv-txlog-api:
    image: federatedserviceconnectivity/txlog-api:v2.4.0
    restart: unless-stopped
    volumes:
      - ./orgs/hypotheekverlener-mock/pki:/certs:ro
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      STORAGE_POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_hv_txlog?sslmode=disable&connect_timeout=2"
      LISTEN_ADDRESS: 0.0.0.0:9443
      LISTEN_ADDRESS_PLAIN: 0.0.0.0:8080
    depends_on:
      postgres:
        condition: service_healthy
      hv-migrations-txlog-api:
        condition: service_started

  # === Belastingdienst-mock (provider) ===================================

  bd-migrations-controller:
    image: federatedserviceconnectivity/controller:v2.4.0
    restart: on-failure
    command:
      - /usr/local/bin/controller
      - migrate
      - up
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_controller?sslmode=disable&connect_timeout=2"
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy

  bd-migrations-manager:
    image: federatedserviceconnectivity/manager:v2.4.0
    restart: on-failure
    command:
      - /usr/local/bin/manager
      - migrate
      - up
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_manager?sslmode=disable&connect_timeout=2"
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy

  bd-migrations-txlog-api:
    image: federatedserviceconnectivity/txlog-api:v2.4.0
    restart: on-failure
    command:
      - /usr/local/bin/txlog-api
      - migrate
      - up
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_txlog?sslmode=disable&connect_timeout=2"
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy

  bd-controller:
    image: federatedserviceconnectivity/controller:v2.4.0
    restart: unless-stopped
    ports:
      - "8095:3001"
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      LISTEN_ADDRESS_UI: 0.0.0.0:3001
      LISTEN_ADDRESS_REGISTRATION_API: 0.0.0.0:9443
      LISTEN_ADDRESS_ADMINISTRATION_API: 0.0.0.0:9444
      MANAGER_ADDRESS_INTERNAL: https://bd-manager:9443
      DIRECTORY_ADDRESS: https://directory-manager:8443
      STORAGE_POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_controller?sslmode=disable&connect_timeout=2"
      AUDITLOG_TYPE: "stdout"
    depends_on:
      postgres:
        condition: service_healthy
      bd-manager:
        condition: service_started
      bd-migrations-controller:
        condition: service_started

  bd-manager:
    image: federatedserviceconnectivity/manager:v2.4.0
    restart: unless-stopped
    # Seed automation: Belastingdienst-mock as service-provider
    # auto-signs incoming serviceConnection requests. In production a
    # real PDP would sit here (see --auto-sign-pdp-address); for the
    # demo auto-accept is fine.
    command: ["/usr/local/bin/manager", "serve", "--auto-sign-grants=serviceConnection"]
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      TLS_GROUP_CERT: /certs/org/bd-mock.pem
      TLS_GROUP_KEY: /certs/org/bd-mock-key.pem
      TLS_GROUP_TOKEN_CERT: /certs/org/bd-mock.pem
      TLS_GROUP_TOKEN_KEY: /certs/org/bd-mock-key.pem
      TLS_GROUP_CONTRACT_CERT: /certs/org/bd-mock.pem
      TLS_GROUP_CONTRACT_KEY: /certs/org/bd-mock-key.pem
      TLS_INTERNAL_UNAUTHENTICATED_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_INTERNAL_UNAUTHENTICATED_CERT: /certs/internal/internal-cert.pem
      TLS_INTERNAL_UNAUTHENTICATED_KEY: /certs/internal/internal-cert-key.pem
      LISTEN_ADDRESS_INTERNAL: 0.0.0.0:9443
      LISTEN_ADDRESS_INTERNAL_UNAUTHENTICATED: 0.0.0.0:9444
      LISTEN_ADDRESS_EXTERNAL: 0.0.0.0:8443
      CONTROLLER_REGISTRATION_API_ADDRESS: https://bd-controller:9443
      TX_LOG_API_ADDRESS: https://bd-txlog-api:9443
      SELF_ADDRESS: "https://bd-manager:8443"
      DIRECTORY_MANAGER_ADDRESS: "https://directory-manager:8443"
      DIRECTORY_PEER_ID: "99999999900000000000"
      STORAGE_POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_manager?sslmode=disable&connect_timeout=2"
    depends_on:
      postgres:
        condition: service_healthy
      bd-migrations-manager:
        condition: service_started
      bd-txlog-api:
        condition: service_started

  bd-inway:
    image: federatedserviceconnectivity/inway:v2.4.0
    restart: unless-stopped
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
      # The pdp-service self-signed cert serves as CA for the AuthZen
      # plugin (see AUTHZEN_ROOT_CA). Separate mount root to avoid a
      # conflict with /certs (ro).
      - ../services/pdp-service/certs:/authzen-ca:ro
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      TLS_GROUP_CERT: /certs/org/bd-mock.pem
      TLS_GROUP_KEY: /certs/org/bd-mock-key.pem
      LISTEN_ADDRESS: 0.0.0.0:443
      NAME: BdInway-01
      SELF_ADDRESS: "https://bd-inway:443"
      CONTROLLER_REGISTRATION_API_ADDRESS: https://bd-controller:9443
      TX_LOG_API_ADDRESS: https://bd-txlog-api:9443
      MANAGER_INTERNAL_UNAUTHENTICATED_ADDRESS: https://bd-manager:9444
      # Every inbound request is AuthZen-checked by the PDP before it
      # reaches the backend service. FSC-Inway requires HTTPS + CA;
      # pdp-service gets a self-signed cert (via generate-pdp-cert.sh),
      # mounted as /authzen-ca/pdp-service.pem in bd-inway.
      AUTHZEN_SERVICE_ADDRESS: https://pdp-service:4008
      AUTHZEN_ROOT_CA: /authzen-ca/pdp-service.pem
      AUTHZEN_WITH_BODY: "true"
    depends_on:
      - bd-controller
      - bd-manager
      - bd-txlog-api

  bd-txlog-api:
    image: federatedserviceconnectivity/txlog-api:v2.4.0
    restart: unless-stopped
    volumes:
      - ./orgs/belastingdienst-mock/pki:/certs:ro
    environment:
      TLS_GROUP_ROOT_CERT: /certs/org/root.pem
      TLS_ROOT_CERT: /certs/internal/intermediate_ca.pem
      TLS_CERT: /certs/internal/internal-cert.pem
      TLS_KEY: /certs/internal/internal-cert-key.pem
      GROUP_ID: fsc-demo
      STORAGE_POSTGRES_DSN: "postgresql://postgres:${FSC_POSTGRES_PASSWORD:-postgres}@postgres:5432/fsc_bd_txlog?sslmode=disable&connect_timeout=2"
      LISTEN_ADDRESS: 0.0.0.0:9443
      LISTEN_ADDRESS_PLAIN: 0.0.0.0:8080
    depends_on:
      postgres:
        condition: service_healthy
      bd-migrations-txlog-api:
        condition: service_started

volumes:
  postgres-data:
