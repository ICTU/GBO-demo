# Clean (directive-free) SDL for the DvTP inkomensgegevens-bron. The PDP
# uses this as a structural reference to bind queried fields to rules; it
# is NOT policy — the binding lives in the rules themselves (covers_types
# / covers_fields).
#
# Mirrored from graphql-server/main.go buildSchema() — keep in sync when
# the bron-schema changes. Future slice may codegen this from the live
# server's introspection.

type Query {
  inkomensgegevens(input: InkomensgegevensInput!): [InkomensgegevensPerJaar!]!
}

input InkomensgegevensInput {
  # Consumer-facing field name. The gateway translates `consentId` to
  # `burgerservicenummer` after the OPA call, so the PDP sees the
  # consumer schema, not the bronhouder schema (two-schema model).
  consentId: ID!
  belastingjaren: [Int!]
}

type InkomensgegevensPerJaar {
  belastingjaar: Int!
  verzamelinkomen: Int
  inkomenUitBox1: Int
  inkomenUitBox2: Int
  inkomenUitBox3: Int
  grondslag: CodeOmschrijving
  status: CodeOmschrijving
  peilDatum: String
}

type CodeOmschrijving {
  code: String!
  omschrijving: String!
}
